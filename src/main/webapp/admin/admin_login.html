<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwiftShip Admin - Login</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">

    <div class="w-100 px-3" style="max-width: 450px;">
        <div class="admin-card p-4 p-md-5 text-center shadow-lg border-secondary">
            
            <div class="mb-4">
                <h1 class="text-light fw-bold mb-1 fs-2">
                    <i class="bi bi-box-seam-fill text-primary me-2"></i>SwiftShip
                </h1>
                <p class="">Admin Portal Login</p>
            </div>

            <div class="alert alert-danger d-none align-items-center text-start mb-4 border-danger border-opacity-50" id="errorMsg" role="alert">
                <i class="bi bi-exclamation-octagon-fill me-2 fs-5"></i>
                <div>Invalid credentials. Please try again.</div>
            </div>

            <form id="adminLoginForm" onsubmit="handleLogin(event)" class="text-start">
                <div class="mb-3">
                    <label for="username" class="form-label small fw-medium">Username / Email</label>
                    <input type="text" class="form-control form-control-lg form-custom bg-dark text-light border-secondary" id="username" placeholder="Enter your admin username" required>
                </div>
                
                <div class="mb-4">
                    <label for="password" class="form-label small fw-medium">Password</label>
                    <input type="password" class="form-control form-control-lg form-custom bg-dark text-light border-secondary" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-2 fw-medium fs-6" id="loginBtn">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Login
                </button>
            </form>

            <div class="mt-4 pt-3 border-top border-secondary">
                <a href="../index.html" class="text-decoration-none small hover-primary" style="transition: color 0.2s;">
                    <i class="bi bi-arrow-left me-1"></i> Back to Public Tracking Site
                </a>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function handleLogin(event) {
            event.preventDefault();
            
            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');
            const usernameInput = document.getElementById('username').value.trim();
            
            // UI Loading state
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" aria-hidden="true"></span>Authenticating...';
            btn.classList.add('disabled');
            errorMsg.classList.add('d-none');
            errorMsg.classList.remove('d-flex');
            
            // Simulate network request delay
            setTimeout(() => {
                // Mock Authentication logic for prototyping
                // Try logging in with the username 'admin' to test success state
                if (usernameInput.toLowerCase() === 'admin') {
                    window.location.href = 'admin_dashboard.html';
                } else {
                    // Reset button and show error
                    btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>Login';
                    btn.classList.remove('disabled');
                    errorMsg.classList.remove('d-none');
                    errorMsg.classList.add('d-flex');
                }
            }, 800);
        }
    </script>
</body>
</html>
