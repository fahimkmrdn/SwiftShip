<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwiftShip Admin - Generate Reports</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Custom Admin CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="d-flex min-vh-100">
        
        <!-- Sidebar -->
        <aside class="sidebar d-none d-lg-flex flex-column flex-shrink-0">
            <div class="brand-header p-4 border-bottom border-secondary">
                <h1 class="m-0"><i class="bi bi-box-seam-fill text-primary me-2"></i>SwiftShip</h1>
                <p class="text-muted small m-0 mt-1">Admin Portal</p>
            </div>
            <nav class="nav flex-column flex-grow-1 py-3 overflow-auto">
                <a href="admin_dashboard.html" class="nav-item-link">
                    <i class="bi bi-grid-1x2-fill"></i> DASHBOARD HOME
                </a>
                <a href="admin_register.html" class="nav-item-link">
                    <i class="bi bi-pencil-square"></i> REGISTER SHIPMENT
                </a>
                <a href="admin_update.html" class="nav-item-link">
                    <i class="bi bi-arrow-repeat"></i> UPDATE STATUS
                </a>
                <a href="admin_compare.html" class="nav-item-link">
                    <i class="bi bi-calculator-fill"></i> COMPARE RATES
                </a>
                <a href="admin_reports.html" class="nav-item-link active">
                    <i class="bi bi-bar-chart-fill"></i> REPORTS
                </a>
            </nav>
        </aside>

        <!-- Main Content Wrapper -->
        <div class="flex-grow-1 d-flex flex-column w-100">
            
            <header class="topbar d-flex justify-content-between align-items-center px-4 sticky-top">
                <div class="d-flex align-items-center">
                    <button class="btn btn-outline-secondary d-lg-none me-3 border-0">
                        <i class="bi bi-list fs-4"></i>
                    </button>
                    <h2 class="text-light m-0 fs-4 fw-semibold">Generate Reports</h2>
                </div>
                
                <div class="d-flex align-items-center gap-4">
                    <div class="d-none d-md-flex align-items-center gap-2 text-light">
                        <i class="bi bi-person-circle fs-4 text-secondary"></i>
                        <span class="fw-medium">Admin User (Staff)</span>
                    </div>
                    <a href="admin_login.html" class="btn btn-outline-danger btn-sm px-3 fw-medium">
                        <i class="bi bi-box-arrow-right me-1"></i> Logout
                    </a>
                </div>
            </header>

            <main class="p-4 flex-grow-1 overflow-auto">
                
                <!-- Report Filters Card -->
                <div class="admin-card p-4 mb-4">
                    <div class="mb-4 border-bottom border-secondary pb-3">
                        <h3 class="m-0 text-light fs-5 fw-semibold"><i class="bi bi-funnel-fill me-2 text-primary"></i>Report Filters</h3>
                    </div>
                    
                    <form id="reportFilters" onsubmit="generateReport(event)">
                        <div class="row g-3 mb-4">
                            <div class="col-md-3">
                                <label for="dateFrom" class="form-label text-muted small fw-medium">Date From</label>
                                <input type="date" class="form-control form-custom" id="dateFrom" required>
                            </div>
                            <div class="col-md-3">
                                <label for="dateTo" class="form-label text-muted small fw-medium">Date To</label>
                                <input type="date" class="form-control form-custom" id="dateTo" required>
                            </div>
                            <div class="col-md-3">
                                <label for="carrierFilter" class="form-label text-muted small fw-medium">Carrier</label>
                                <select class="form-select form-custom" id="carrierFilter">
                                    <option value="ALL">All Carriers</option>
                                    <option value="DHL">DHL Express</option>
                                    <option value="POSL">Pos Laju</option>
                                    <option value="JNT">J&T Express</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label for="statusFilter" class="form-label text-muted small fw-medium">Status</label>
                                <select class="form-select form-custom" id="statusFilter">
                                    <option value="ALL">All Statuses</option>
                                    <option value="BOOKED">Booked</option>
                                    <option value="TRANSIT">In Transit</option>
                                    <option value="DELIVERED">Delivered</option>
                                </select>
                            </div>
                        </div>
                        <div class="text-end border-top border-secondary pt-3">
                            <button type="submit" class="btn btn-primary px-4 fw-medium" id="generateBtn">
                                <i class="bi bi-file-earmark-bar-graph me-2"></i>Generate Report
                            </button>
                        </div>
                    </form>
                </div>

                <!-- Hidden Results Container -->
                <div id="reportResults" class="d-none">
                    
                    <!-- KPI Summary -->
                    <div class="row g-4 mb-4">
                        <div class="col-12 col-md-4">
                            <div class="admin-card p-4 text-center h-100">
                                <h4 class="text-uppercase text-muted fs-6 fw-bold mb-2">Total Shipments</h4>
                                <div class="stat-value" id="kpiTotal">0</div>
                            </div>
                        </div>
                        <div class="col-12 col-md-4">
                            <div class="admin-card p-4 text-center h-100 border-success border-opacity-50">
                                <h4 class="text-uppercase text-muted fs-6 fw-bold mb-2">Delivered</h4>
                                <div class="stat-value text-success" id="kpiDelivered">0</div>
                            </div>
                        </div>
                        <div class="col-12 col-md-4">
                            <div class="admin-card p-4 text-center h-100 border-warning border-opacity-50">
                                <h4 class="text-uppercase text-muted fs-6 fw-bold mb-2">Pending / Transit</h4>
                                <div class="stat-value text-warning" id="kpiPending">0</div>
                            </div>
                        </div>
                    </div>

                    <!-- Data Table -->
                    <div class="admin-card">
                        <div class="p-4 border-bottom border-secondary d-flex justify-content-between align-items-center flex-wrap gap-3">
                            <h3 class="m-0 text-light fs-5 fw-semibold">Shipment Data</h3>
                            <button type="button" class="btn btn-success btn-sm px-3 fw-medium" onclick="exportToCSV()">
                                <i class="bi bi-file-earmark-excel-fill me-1"></i> Export CSV
                            </button>
                        </div>
                        <div class="table-responsive">
                            <table class="table table-custom table-hover align-middle" id="reportTable">
                                <thead>
                                    <tr>
                                        <th scope="col">Tracking #</th>
                                        <th scope="col">Date Added</th>
                                        <th scope="col">Carrier</th>
                                        <th scope="col">Sender</th>
                                        <th scope="col">Destination</th>
                                        <th scope="col">Status</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <!-- Populated by JavaScript -->
                                </tbody>
                            </table>
                        </div>
                    </div>

                </div>

            </main>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Mock data adjusted to use the new Bootstrap custom classes
        const mockData = [
            { id: "DHL593847291", date: "2026-10-15", carrier: "DHL Express", sender: "Izzudin", dest: "Kuala Lumpur", status: "Delivered", statusClass: "bg-delivered" },
            { id: "POSL92837465", date: "2026-10-20", carrier: "Pos Laju", sender: "Muthu", dest: "Penang", status: "In Transit", statusClass: "bg-transit" },
            { id: "JNT102938475", date: "2026-10-24", carrier: "J&T Express", sender: "UiTM", dest: "Johor Bahru", status: "Booked", statusClass: "bg-booked" },
            { id: "DHL445566778", date: "2026-10-22", carrier: "DHL Express", sender: "Man", dest: "Selangor", status: "Delivered", statusClass: "bg-delivered" },
            { id: "POSL11223344", date: "2026-10-24", carrier: "Pos Laju", sender: "Speed", dest: "Sabah", status: "In Transit", statusClass: "bg-transit" },
        ];

        function generateReport(event) {
            event.preventDefault();
            
            const btn = document.getElementById('generateBtn');
            const resultsContainer = document.getElementById('reportResults');
            const tableBody = document.querySelector('#reportTable tbody');
            
            // Loading state
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" aria-hidden="true"></span>Processing...';
            btn.classList.add('disabled');
            resultsContainer.classList.add('d-none');
            tableBody.innerHTML = '';
            
            // Simulate network delay
            setTimeout(() => {
                document.getElementById('kpiTotal').innerText = mockData.length;
                document.getElementById('kpiDelivered').innerText = mockData.filter(d => d.status === 'Delivered').length;
                document.getElementById('kpiPending').innerText = mockData.filter(d => d.status !== 'Delivered').length;

                mockData.forEach(row => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><strong class="text-light">${row.id}</strong></td>
                        <td>${row.date}</td>
                        <td>
                            <span class="d-inline-flex align-items-center gap-1">
                                <i class="bi bi-truck text-muted"></i> ${row.carrier}
                            </span>
                        </td>
                        <td>${row.sender}</td>
                        <td>${row.dest}</td>
                        <td><span class="badge-custom ${row.statusClass}">${row.status}</span></td>
                    `;
                    tableBody.appendChild(tr);
                });

                // Reset button and show results
                btn.innerHTML = '<i class="bi bi-file-earmark-bar-graph me-2"></i>Generate Report';
                btn.classList.remove('disabled');
                resultsContainer.classList.remove('d-none');

                document.querySelector('.flex-grow-1.overflow-auto').scrollTo({ 
                    top: resultsContainer.offsetTop - 20, 
                    behavior: 'smooth' 
                });

            }, 600); 
        }

        function exportToCSV() {
            let csvContent = "data:text/csv;charset=utf-8,";
            csvContent += "Tracking Number,Date Added,Carrier,Sender,Destination,Status\n";

            mockData.forEach(function(rowArray) {
                let row = `${rowArray.id},${rowArray.date},"${rowArray.carrier}","${rowArray.sender}","${rowArray.dest}","${rowArray.status}"`;
                csvContent += row + "\n";
            });

            var encodedUri = encodeURI(csvContent);
            var link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "swiftship_report_" + new Date().getTime() + ".csv");
            document.body.appendChild(link);

            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
